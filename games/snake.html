<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贪吃蛇</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 16px;
      letter-spacing: 4px;
      color: #4ecca3;
    }

    canvas {
      display: block;
      border: 2px solid #4ecca3;
      border-radius: 4px;
      box-shadow: 0 0 24px rgba(78, 204, 163, 0.3);
    }
  </style>
</head>
<body>
  <h1>贪吃蛇</h1>
  <canvas id="gameCanvas"></canvas>

  <script>
    // ── Constants ──────────────────────────────────────────────
    const CELL = 20;       // px per grid cell
    const COLS = 25;
    const ROWS = 25;
    const BASE_SPEED = 150; // ms per frame

    // ── Canvas setup ───────────────────────────────────────────
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width  = COLS * CELL;
    canvas.height = ROWS * CELL;

    // ── Game state ─────────────────────────────────────────────
    let snake, dir, nextDir, food, score, loopId, gameOver, started;
    let currentSpeed = BASE_SPEED;
    let bestScore = parseInt(localStorage.getItem('snakeBest') || '0', 10);

    function initState() {
      const cx = Math.floor(COLS / 2);
      const cy = Math.floor(ROWS / 2);
      snake = [
        { x: cx,     y: cy },
        { x: cx - 1, y: cy },
        { x: cx - 2, y: cy },
      ];
      dir = nextDir = { x: 1, y: 0 };
      score = 0;
      gameOver = false;
      started = false;
      currentSpeed = BASE_SPEED;
      spawnFood();
    }

    function spawnFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    // ── Keyboard controls ──────────────────────────────────────
    document.addEventListener('keydown', e => {
      const map = {
        ArrowUp:    { x:  0, y: -1 },
        ArrowDown:  { x:  0, y:  1 },
        ArrowLeft:  { x: -1, y:  0 },
        ArrowRight: { x:  1, y:  0 },
        w: { x:  0, y: -1 },
        s: { x:  0, y:  1 },
        a: { x: -1, y:  0 },
        d: { x:  1, y:  0 },
        W: { x:  0, y: -1 },
        S: { x:  0, y:  1 },
        A: { x: -1, y:  0 },
        D: { x:  1, y:  0 },
      };
      const d = map[e.key];
      if (!d) return;
      // Prevent reversing direction
      if (d.x === -dir.x && d.y === -dir.y) return;
      nextDir = d;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
        e.preventDefault();
      }
      if (e.key === ' ') {
        if (!started) {
          started = true;
          startLoop(currentSpeed);
        } else if (gameOver) {
          restartGame();
        }
        e.preventDefault();
      }
    });

    // ── Drawing helpers ────────────────────────────────────────
    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawBackground() {
      ctx.fillStyle = '#16213e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      // subtle grid
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 0.5;
      for (let c = 0; c <= COLS; c++) {
        ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, canvas.height); ctx.stroke();
      }
      for (let r = 0; r <= ROWS; r++) {
        ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(canvas.width, r * CELL); ctx.stroke();
      }
    }

    function drawSnake() {
      snake.forEach((seg, i) => {
        const px = seg.x * CELL + 1;
        const py = seg.y * CELL + 1;
        const sz = CELL - 2;
        if (i === 0) {
          ctx.fillStyle = '#4ecca3';
        } else {
          const alpha = 1 - (i / snake.length) * 0.4;
          ctx.fillStyle = `rgba(78,204,163,${alpha})`;
        }
        roundRect(px, py, sz, sz, 4);
        ctx.fill();
      });
    }

    function drawFood() {
      const px = food.x * CELL + CELL / 2;
      const py = food.y * CELL + CELL / 2;
      ctx.beginPath();
      ctx.arc(px, py, CELL / 2 - 3, 0, Math.PI * 2);
      ctx.fillStyle = '#e94560';
      ctx.fill();
      // shine
      ctx.beginPath();
      ctx.arc(px - 3, py - 3, 3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fill();
    }

    function drawScoreboard() {
      ctx.textAlign = 'left';
      ctx.font = 'bold 14px Segoe UI';
      ctx.fillStyle = '#4ecca3';
      ctx.fillText(`得分: ${score}`, 8, 18);
      ctx.textAlign = 'right';
      ctx.fillStyle = '#aaa';
      ctx.fillText(`最高: ${bestScore}`, canvas.width - 8, 18);
    }

    function drawStartScreen() {
      ctx.fillStyle = 'rgba(22,33,62,0.92)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.textAlign = 'center';
      ctx.fillStyle = '#4ecca3';
      ctx.font = 'bold 42px Segoe UI';
      ctx.fillText('贪吃蛇', canvas.width / 2, canvas.height / 2 - 50);

      ctx.fillStyle = '#aaa';
      ctx.font = '16px Segoe UI';
      ctx.fillText(`最高分: ${bestScore}`, canvas.width / 2, canvas.height / 2);

      ctx.fillStyle = '#eee';
      ctx.font = 'bold 18px Segoe UI';
      ctx.fillText('按空格键开始', canvas.width / 2, canvas.height / 2 + 44);
    }

    // ── Main draw ──────────────────────────────────────────────
    function draw() {
      drawBackground();
      if (!started) { drawStartScreen(); return; }
      drawFood();
      drawSnake();
      drawScoreboard();
    }

    // ── Game loop ──────────────────────────────────────────────
    function startLoop(speed) {
      if (loopId) clearInterval(loopId);
      loopId = setInterval(gameTick, speed);
    }

    function moveSnake() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        // Ate food — keep tail, grow by 1
        score += 10;
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem('snakeBest', bestScore);
        }
        // Speed up every 5 foods eaten
        const foodsEaten = score / 10;
        if (foodsEaten % 5 === 0) {
          currentSpeed = Math.max(60, Math.floor(currentSpeed * 0.95));
          startLoop(currentSpeed);
        }
        spawnFood();
      } else {
        snake.pop();
      }
    }

    function checkCollision() {
      const head = snake[0];
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return true;
      for (let i = 1; i < snake.length; i++) {
        if (snake[i].x === head.x && snake[i].y === head.y) return true;
      }
      return false;
    }

    function drawGameOver() {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.textAlign = 'center';
      ctx.fillStyle = '#e94560';
      ctx.font = 'bold 36px Segoe UI';
      ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2 - 40);

      ctx.fillStyle = '#eee';
      ctx.font = '22px Segoe UI';
      ctx.fillText(`得分: ${score}`, canvas.width / 2, canvas.height / 2 + 4);

      ctx.fillStyle = '#4ecca3';
      ctx.font = '16px Segoe UI';
      ctx.fillText('按空格键重新开始', canvas.width / 2, canvas.height / 2 + 44);
    }

    function gameTick() {
      if (!started || gameOver) return;
      moveSnake();
      if (checkCollision()) {
        clearInterval(loopId);
        loopId = null;
        gameOver = true;
        draw();
        drawGameOver();
        return;
      }
      draw();
    }

    function restartGame() {
      if (loopId) { clearInterval(loopId); loopId = null; }
      initState();
      started = true;
      draw();
      startLoop(currentSpeed);
    }

    // ── Boot ───────────────────────────────────────────────────
    initState();
    draw(); // shows start screen
  </script>
</body>
</html>
